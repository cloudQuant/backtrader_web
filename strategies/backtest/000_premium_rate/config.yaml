# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "可转债溢价率双均线策略"
  description: "基于可转债转股溢价率的双均线交叉策略。当短期均线向上穿越长期均线时买入，向下穿越时卖出。"
  author: "backtrader_web"

# ============================================================
# 策略参数
# ============================================================
params:
  short_period: 10      # 短期均线周期
  long_period: 60       # 长期均线周期

# ============================================================
# 数据配置
# ============================================================
data:
  symbol: "113013"           # 可转债代码
  data_type: "bond"          # 数据类型: bond(可转债)/stock(股票)/future(期货)/index(指数)

# ============================================================
# 回测配置
# ============================================================
backtest:
  initial_cash: 100000    # 初始资金
  commission: 0.0003      # 手续费率 (0.03%)
# ============================================================
# CTP 连接配置（用于模拟盘，请填写 CTP 模拟账号）
# ============================================================
ctp:
  broker_id: "3070"
  investor_id: "333306116"
  user_id: "333306116"
  password: "199057"
  app_id: "client_wtyj_1.0.9.9"
  auth_code: "VCSX4A2S43I4RN25"
  user_product_info: "wtpy"
  interface_product_info: "wtpy"
  fronts:
    telecom:
      td_address: "tcp://101.230.79.235:32205"
      md_address: "tcp://101.230.79.235:32213"

# ============================================================
# CTP 模拟盘会话参数
# ============================================================
live:
  symbol: "rb2504"  # CTP仅支持期货，回测为非期货时请按需修改
  network: "telecom"
  bar_seconds: 60
  duration_seconds: 3600
  session_timeout: 3700
  min_price_tick: 1.0
  max_order_size: 1
  contract_metadata:
    rb2504:
      min_price_tick: 1.0
      max_order_size: 1
