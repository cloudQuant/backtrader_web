# ============================================================
# CTP 模拟盘会话参数
# ============================================================
live:
  symbol: "rb2504"  # CTP仅支持期货，回测为非期货时请按需修改
  network: "telecom"
  bar_seconds: 60
  duration_seconds: 3600
  session_timeout: 3700
  min_price_tick: 1.0
  max_order_size: 1
  contract_metadata:
    rb2504:
      min_price_tick: 1.0
      max_order_size: 1
