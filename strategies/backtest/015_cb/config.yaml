# 策略基本信息
strategy:
  name: "可转债多因子日内策略"
  description: "基于多因子筛选的可转债日内交易策略，同时交易多个可转债品种"
  author: "yunjinqi"

# 策略参数
params:
  ma_period: 20        # 均线周期
  can_trade_num: 2     # 最大可同时持有的可转债数量

# 数据配置
data:
  symbol: "bond_merged_all_data"  # 可转债合并数据
  data_type: "bond"               # 可转债数据
  index_symbol: "000000"          # 指数代码

# 回测配置
backtest:
  initial_cash: 1000000    # 初始资金
  commission: 0.0001       # 手续费率
  margin: 0.1              # 保证金比例
  mult: 1                  # 合约乘数

# 因子配置
factors:
  price_change_range: [-0.01, 0.01]  # 价格涨跌幅范围
  volume_multiplier: 4                # 成交量倍数限制
  profit_target: 0.03                 # 目标收益率(3%)
  max_hold_bars: 10                   # 最大持仓bar数
# ============================================================
# CTP 连接配置（用于模拟盘，请填写 CTP 模拟账号）
# ============================================================
ctp:
  broker_id: "3070"
  investor_id: "333306116"
  user_id: "333306116"
  password: "199057"
  app_id: "client_wtyj_1.0.9.9"
  auth_code: "VCSX4A2S43I4RN25"
  user_product_info: "wtpy"
  interface_product_info: "wtpy"
  fronts:
    telecom:
      td_address: "tcp://101.230.79.235:32205"
      md_address: "tcp://101.230.79.235:32213"

# ============================================================
# CTP 模拟盘会话参数
# ============================================================
live:
  symbol: "rb2504"  # CTP仅支持期货，回测为非期货时请按需修改
  network: "telecom"
  bar_seconds: 60
  duration_seconds: 3600
  session_timeout: 3700
  min_price_tick: 1.0
  max_order_size: 1
  contract_metadata:
    rb2504:
      min_price_tick: 1.0
      max_order_size: 1
