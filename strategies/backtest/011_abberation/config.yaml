# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "Abberation布林带突破策略"
  description: "基于布林带上下轨突破的趋势跟踪策略。突破上轨做多，突破下轨做空，回归中轨时平仓。"
  author: "yunjinqi"

# ============================================================
# 策略参数
# ============================================================
params:
  boll_period: 200     # 布林带周期
  boll_mult: 2         # 布林带倍数

# ============================================================
# 数据配置
# ============================================================
data:
  symbol: "RB889"            # 螺纹钢期货代码
  data_type: "future"       # 数据类型: future(期货)

# ============================================================
# 回测配置
# ============================================================
backtest:
  initial_cash: 1000000   # 初始资金（100万）
  commission: 0.0001      # 手续费率 (0.01%)
  margin: 0.10            # 保证金比例 (10%)
  multiplier: 10          # 合约乘数
# ============================================================
# CTP 连接配置（用于模拟盘，请填写 CTP 模拟账号）
# ============================================================
ctp:
  broker_id: "3070"
  investor_id: "333306116"
  user_id: "333306116"
  password: "199057"
  app_id: "client_wtyj_1.0.9.9"
  auth_code: "VCSX4A2S43I4RN25"
  user_product_info: "wtpy"
  interface_product_info: "wtpy"
  fronts:
    telecom:
      td_address: "tcp://101.230.79.235:32205"
      md_address: "tcp://101.230.79.235:32213"

# ============================================================
# CTP 模拟盘会话参数
# ============================================================
live:
  symbol: "rb2504"  # CTP仅支持期货，回测为非期货时请按需修改
  network: "telecom"
  bar_seconds: 60
  duration_seconds: 3600
  session_timeout: 3700
  min_price_tick: 1.0
  max_order_size: 1
  contract_metadata:
    rb2504:
      min_price_tick: 1.0
      max_order_size: 1
