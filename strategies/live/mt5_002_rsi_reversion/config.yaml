# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "MT5 RSI均值回归策略"
  description: "基于RSI超买超卖的均值回归策略，适用于MT5外汇品种。RSI低于超卖线买入，高于超买线卖出。"
  author: "backtrader_web"

# ============================================================
# 策略参数
# ============================================================
params:
  rsi_period: 14
  oversold: 30
  overbought: 70
  volume: 0.01

# ============================================================
# 数据配置
# ============================================================
data:
  symbol: "GBPUSD"
  timeframe: "M15"

# ============================================================
# MT5 连接配置
# ============================================================
mt5:
  login: ""
  password: ""
  ws_uri: ""
  symbol_suffix: ""

# ============================================================
# 实盘参数
# ============================================================
live:
  symbol: "GBPUSD"
  bar_seconds: 900
  duration_seconds: 86400
  session_timeout: 86500

# ============================================================
# Gateway 配置
# ============================================================
gateway:
  enabled: true
  provider: "mt5_gateway"
  exchange_type: "MT5"
  asset_type: "OTC"
