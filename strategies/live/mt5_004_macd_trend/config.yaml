# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "MT5 MACD趋势跟踪策略"
  description: "基于MACD指标的趋势跟踪策略，适用于MT5外汇品种。MACD金叉且柱状图为正时做多，死叉平仓。"
  author: "backtrader_web"

# ============================================================
# 策略参数
# ============================================================
params:
  fast_period: 12
  slow_period: 26
  signal_period: 9
  volume: 0.01

# ============================================================
# 数据配置
# ============================================================
data:
  symbol: "XAUUSD"
  timeframe: "H1"

# ============================================================
# MT5 连接配置
# ============================================================
mt5:
  login: ""
  password: ""
  ws_uri: ""
  symbol_suffix: ""

# ============================================================
# 实盘参数
# ============================================================
live:
  symbol: "XAUUSD"
  bar_seconds: 3600
  duration_seconds: 86400
  session_timeout: 86500

# ============================================================
# Gateway 配置
# ============================================================
gateway:
  enabled: true
  provider: "mt5_gateway"
  exchange_type: "MT5"
  asset_type: "OTC"
