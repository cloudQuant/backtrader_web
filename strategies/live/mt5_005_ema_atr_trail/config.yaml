# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "MT5 EMA+ATR移动止损策略"
  description: "基于EMA趋势方向和ATR动态止损的策略，适用于MT5外汇品种。EMA趋势向上时做多，ATR移动止损保护利润。"
  author: "backtrader_web"

# ============================================================
# 策略参数
# ============================================================
params:
  ema_period: 50
  atr_period: 14
  atr_multiplier: 2.0
  volume: 0.01

# ============================================================
# 数据配置
# ============================================================
data:
  symbol: "AUDUSD"
  timeframe: "H1"

# ============================================================
# MT5 连接配置
# ============================================================
mt5:
  login: ""
  password: ""
  ws_uri: ""
  symbol_suffix: ""

# ============================================================
# 实盘参数
# ============================================================
live:
  symbol: "AUDUSD"
  bar_seconds: 3600
  duration_seconds: 86400
  session_timeout: 86500

# ============================================================
# Gateway 配置
# ============================================================
gateway:
  enabled: true
  provider: "mt5_gateway"
  exchange_type: "MT5"
  asset_type: "OTC"
