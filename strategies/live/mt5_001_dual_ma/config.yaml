# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "MT5 双均线交叉策略"
  description: "经典双均线交叉策略，适用于MT5外汇品种。短期均线上穿长期均线买入，下穿卖出。"
  author: "backtrader_web"

# ============================================================
# 策略参数
# ============================================================
params:
  short_period: 10
  long_period: 30
  volume: 0.01

# ============================================================
# 数据配置
# ============================================================
data:
  symbol: "EURUSD"
  timeframe: "M5"

# ============================================================
# MT5 连接配置
# ============================================================
mt5:
  login: ""
  password: ""
  ws_uri: ""
  symbol_suffix: ""

# ============================================================
# 实盘参数
# ============================================================
live:
  symbol: "EURUSD"
  bar_seconds: 300
  duration_seconds: 86400
  session_timeout: 86500

# ============================================================
# Gateway 配置
# ============================================================
gateway:
  enabled: true
  provider: "mt5_gateway"
  exchange_type: "MT5"
  asset_type: "OTC"
