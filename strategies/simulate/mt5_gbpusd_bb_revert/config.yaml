# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "MT5 英镑布林带回归策略"
  description: "基于布林带的均值回归策略，价格突破下轨买入，突破上轨平仓。适用于GBPUSD M30周期。"
  author: "backtrader_web"
  category: "simulate"

# ============================================================
# 品种信息
# ============================================================
symbol:
  code: "GBPUSD"
  name: "英镑/美元"
  exchange: "MT5"
  multiplier: 100000
  margin_rate: 0.01

# ============================================================
# 策略参数
# ============================================================
params:
  boll_period: 20
  boll_dev: 2.0
  volume: 0.01

# ============================================================
# 数据配置
# ============================================================
data:
  symbol: "GBPUSD"
  data_type: "otc"
  exchange: "MT5"
  timeframe: "M30"
  warmup_bars: 150

# ============================================================
# 模拟交易配置
# ============================================================
simulate:
  initial_cash: 10000
  commission: 0.00007
  slippage: 0.00002
  position_size: 0.01

# ============================================================
# 风控配置
# ============================================================
risk:
  max_position: 0.1
  max_loss_per_trade: 0.02
  max_drawdown: 0.12

# ============================================================
# MT5 连接配置
# ============================================================
mt5:
  login: ""
  password: ""
  ws_uri: ""
  symbol_suffix: ""

# ============================================================
# Gateway 配置
# ============================================================
gateway:
  enabled: true
  provider: "mt5_gateway"
  exchange_type: "MT5"
  asset_type: "OTC"

# ============================================================
# 实盘参数
# ============================================================
live:
  symbol: "GBPUSD"
  bar_seconds: 1800
  duration_seconds: 86400
  session_timeout: 86500
