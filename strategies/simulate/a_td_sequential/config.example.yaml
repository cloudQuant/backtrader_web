# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "豆一TD序列策略"
  description: "基于TD序列的反转策略 - 豆一期货"
  author: "backtrader_web"
  category: "simulate"

# ============================================================
# 品种信息
# ============================================================
symbol:
  code: "a"
  name: "豆一"
  exchange: "DCE"
  multiplier: 10
  margin_rate: 0.06

# ============================================================
# 策略参数
# ============================================================
params:

# ============================================================
# 数据配置（本地回测用，可选）
# ============================================================
data:
  symbol: "a"
  data_type: "futures"
  exchange: "DCE"
  timeframe: "1d"

# ============================================================
# 模拟交易 / 回测资金配置
# （本地回测和 CTP 模拟盘都会复用）
# ============================================================
backtest:
  initial_cash: 1000000      # 初始资金100万
  commission: 0.0001         # 手续费率万分之一
  slippage: 0.00005          # 滑点万分之五
  position_size: 1           # 每次交易手数

# ============================================================
# 风控配置（预留，策略可扩展使用）
# ============================================================
risk:
  max_position: 5
  max_loss_per_trade: 0.02
  max_drawdown: 0.15
  stop_loss: 0.03
  take_profit: 0.06

# ============================================================
# CTP 连接配置（仅含非敏感项）
# 凭证(broker_id/investor_id/password等)从 .env 读取，见 .env.example
# ============================================================
ctp:
  app_id: "simnow_client_test"         # SimNow 模拟盘固定值
  auth_code: "0000000000000000"        # SimNow 模拟盘固定值
  user_product_info: ""
  interface_product_info: ""
  fronts:
    telecom:
      td_address: "tcp://180.168.146.187:10231"
      md_address: "tcp://180.168.146.187:10221"
    simnow:
      td_address: "tcp://180.168.146.187:10211"
      md_address: "tcp://180.168.146.187:10201"

# ============================================================
# CTP 实盘 / 仿真会话参数（用于 TD 模拟盘）
# ============================================================
live:
  symbol: "a2609"       # 豆一具体合约
  network: "telecom"
  bar_seconds: 15
  duration_seconds: 180
  session_timeout: 240
  min_price_tick: 1.0
  max_order_size: 1
  contract_metadata:
    a2609:
      min_price_tick: 1.0
      max_order_size: 1
