# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "MT5 美日ADX趋势跟踪策略"
  description: "基于ADX指标和方向线的趋势跟踪策略，ADX强势且+DI>-DI时做多。适用于USDJPY H4周期。"
  author: "backtrader_web"
  category: "simulate"

# ============================================================
# 品种信息
# ============================================================
symbol:
  code: "USDJPY"
  name: "美元/日元"
  exchange: "MT5"
  multiplier: 100000
  margin_rate: 0.01

# ============================================================
# 策略参数
# ============================================================
params:
  adx_period: 14
  adx_threshold: 25
  volume: 0.01

# ============================================================
# 数据配置
# ============================================================
data:
  symbol: "USDJPY"
  data_type: "otc"
  exchange: "MT5"
  timeframe: "H4"
  warmup_bars: 80

# ============================================================
# 模拟交易配置
# ============================================================
simulate:
  initial_cash: 10000
  commission: 0.00007
  slippage: 0.00003
  position_size: 0.01
  duration_seconds: 86400
  session_timeout: 86500

# ============================================================
# 风控配置
# ============================================================
risk:
  max_position: 0.1
  max_loss_per_trade: 0.02
  max_drawdown: 0.15

# ============================================================
# MT5 连接配置
# ============================================================
