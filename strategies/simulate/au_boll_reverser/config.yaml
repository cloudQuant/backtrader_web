# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "黄金布林带反转策略"
  description: "价格触及布林带上下轨后反转交易 - 黄金期货"
  author: "backtrader_web"
  category: "simulate"
  
# ============================================================
# 品种信息
# ============================================================
symbol:
  code: "au"
  name: "黄金"
  exchange: "SHFE"
  multiplier: 1000
  margin_rate: 0.05
  
# ============================================================
# 策略参数
# ============================================================
params:
  period_boll: 52

# ============================================================
# 数据配置
# ============================================================
data:
  symbol: "au"
  data_type: "futures"
  exchange: "SHFE"
  timeframe: "1d"
  
# ============================================================
# 模拟交易配置
# ============================================================
simulate:
  initial_cash: 1000000      # 初始资金100万
  commission: 0.0001         # 手续费率万分之一
  slippage: 0.00005          # 滑点万分之五
  position_size: 1           # 每次交易手数
  
# ============================================================
# 风控配置
# ============================================================
risk:
  max_position: 5            # 最大持仓手数
  max_loss_per_trade: 0.02   # 单笔最大亏损2%
  max_drawdown: 0.15         # 最大回撤15%
  stop_loss: 0.03            # 止损比例3%
  take_profit: 0.06          # 止盈比例6%
# ============================================================
# CTP 连接配置（用于模拟盘，请填写 CTP 模拟账号）
# ============================================================
# 凭证(broker_id/investor_id/password)从 .env 读取，见 .env.example
ctp:
  app_id: "simnow_client_test"
  auth_code: "0000000000000000"
  user_product_info: ""
  interface_product_info: ""
  fronts:
    telecom:
      td_address: "tcp://182.254.243.31:30002"
      md_address: "tcp://182.254.243.31:30012"

# ============================================================
# CTP 模拟盘会话参数
# ============================================================
live:
  symbol: "au2606"
  network: "telecom"
  bar_seconds: 30
  duration_seconds: 86400
  session_timeout: 86500
  min_price_tick: 0.02
  max_order_size: 1
  contract_metadata:
    au2606:
      min_price_tick: 1.0
      max_order_size: 1