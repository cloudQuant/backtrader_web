# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "MT5 欧美双均线交叉策略"
  description: "EURUSD双均线交叉策略，MA10上穿MA30做多，下穿平仓。适用于M15周期。"
  author: "backtrader_web"
  category: "simulate"

# ============================================================
# 品种信息
# ============================================================
symbol:
  code: "EURUSD"
  name: "欧元/美元"
  exchange: "MT5"
  multiplier: 100000
  margin_rate: 0.01

# ============================================================
# 策略参数
# ============================================================
params:
  fast_period: 10
  slow_period: 30
  lot_size: 0.01
  stop_loss_pips: 30
  take_profit_pips: 50

# ============================================================
# 数据配置
# ============================================================
data:
  symbol: "EURUSD"
  data_type: "otc"
  exchange: "MT5"
  timeframe: "M15"
  warmup_bars: 200

# ============================================================
# 模拟交易配置
# ============================================================
simulate:
  initial_cash: 10000
  commission: 0.00007
  slippage: 0.00002
  position_size: 0.01

# ============================================================
# 风控配置
# ============================================================
risk:
  max_position: 0.1
  max_loss_per_trade: 0.02
  max_drawdown: 0.10

# ============================================================
# MT5 连接配置
# ============================================================
mt5:
  login: ""
  password: ""
  ws_uri: ""
  symbol_suffix: ""

# ============================================================
# Gateway 配置
# ============================================================
gateway:
  enabled: true
  provider: "mt5_gateway"
  exchange_type: "MT5"
  asset_type: "OTC"

# ============================================================
# 实盘参数
# ============================================================
live:
  symbol: "EURUSD"
  bar_seconds: 900
  duration_seconds: 86400
  session_timeout: 86500
