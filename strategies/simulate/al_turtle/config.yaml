# ============================================================
# 策略基本信息
# ============================================================
strategy:
  name: "铝海龟交易策略"
  description: "经典的海龟交易系统 - 铝期货"
  author: "backtrader_web"
  category: "simulate"
  
# ============================================================
# 品种信息
# ============================================================
symbol:
  code: "al"
  name: "铝"
  exchange: "SHFE"
  multiplier: 5
  margin_rate: 0.07
  
# ============================================================
# 策略参数
# ============================================================
params:
  # 短期均线周期
  maperiod: 15
  # 突破周期（天数）
  breakout_period_days: 20
  # 价格涨幅阈值（比例）
  price_rate_of_change_perc: 0.1
  # 趋势过滤用的长期均线周期
  regime_filter_ma_period: 200
  # 跟踪止损比例
  trailing_stop_loss_perc: 0.1

# ============================================================
# 数据配置
# ============================================================
data:
  symbol: "al"
  data_type: "futures"
  exchange: "SHFE"
  timeframe: "1d"
  
# ============================================================
# 模拟交易 / 回测资金配置
# （本地回测和 CTP 模拟盘都会复用）
# ============================================================
simulate:
  initial_cash: 1000000      # 初始资金100万
  commission: 0.0001         # 手续费率万分之一
  slippage: 0.00005          # 滑点万分之五
  position_size: 1           # 每次交易手数

backtest:
  initial_cash: 1000000
  commission: 0.0001
  slippage: 0.00005
  position_size: 1

# ============================================================
# 风控配置
# ============================================================
risk:
  max_position: 5            # 最大持仓手数
  max_loss_per_trade: 0.02   # 单笔最大亏损2%
  max_drawdown: 0.15         # 最大回撤15%
  stop_loss: 0.03            # 止损比例3%
  take_profit: 0.06          # 止盈比例6%

# ============================================================
# CTP 连接配置（用于模拟盘，复用 a_td_sequential 相同账号）
# ============================================================
# 凭证(broker_id/investor_id/password)从 .env 读取，见 .env.example
ctp:
  app_id: "simnow_client_test"
  auth_code: "0000000000000000"
  user_product_info: ""
  interface_product_info: ""
  fronts:
    telecom:
      td_address: "tcp://182.254.243.31:30002"
      md_address: "tcp://182.254.243.31:30012"

# ============================================================
# CTP 模拟盘会话参数
# ============================================================
live:
  symbol: "al2607"
  network: "telecom"
  bar_seconds: 5
  duration_seconds: 3600
  session_timeout: 3700
  min_price_tick: 5.0
  max_order_size: 1
  contract_metadata:
    al2507:
      min_price_tick: 5.0
      max_order_size: 1

    al2607:
      min_price_tick: 1.0
      max_order_size: 1