  description: "基于RSI超买超卖的回调入场策略，RSI低于超卖线买入，高于超买线平仓。适用于AUDUSD M15周期。"
  author: "backtrader_web"
  category: "simulate"

# ============================================================
# 品种信息
# ============================================================
symbol:
  code: "AUDUSD"
  name: "澳元/美元"
  exchange: "MT5"
  multiplier: 100000
  margin_rate: 0.01

# ============================================================
# 策略参数
# ============================================================
params:
  rsi_period: 14
  oversold: 30
  overbought: 70
  volume: 0.01

# ============================================================
# 数据配置
# ============================================================
