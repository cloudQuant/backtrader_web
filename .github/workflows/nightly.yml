name: Nightly - Comprehensive Tests

on:
  schedule:
    # Run at 2 AM UTC (10 AM Beijing)
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"

jobs:
  # ========================================
  # Full Test Suite
  # ========================================
  backend-full-tests:
    name: Backend - Full Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres,redis,backtrader]"

      - name: Run all tests with detailed coverage
        run: |
          pip install pytest-cov pytest-xdist
          pytest -n auto --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing -v --tb=short

      - name: Generate coverage badge
        run: |
          pip install coverage-badge
          coverage-badge -o coverage.svg -f

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: nightly-backend-coverage
          path: |
            src/backend/htmlcov/
            src/backend/coverage.xml
            src/backend/coverage.svg
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: src/backend/coverage.xml
          flags: backend-nightly
          name: nightly-backend
          fail_ci_if_error: false

  frontend-full-tests:
    name: Frontend - Full Test Suite
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test -- --run --coverage --reporter=verbose

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: nightly-frontend-coverage
          path: src/frontend/coverage/
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: src/frontend/coverage/coverage-final.json
          flags: frontend-nightly
          name: nightly-frontend
          fail_ci_if_error: false

  # ========================================
  # E2E Full Browser Tests
  # ========================================
  e2e-full-tests:
    name: E2E - All Browsers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/frontend
        run: npx playwright install --with-deps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install backend dependencies
        working-directory: src/backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,backtrader]"

      - name: Start services
        run: |
          # Start backend
          cd src/backend
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          cd ../..

          # Wait for backend
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/health > /dev/null; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done

          # Start frontend
          cd src/frontend
          npm run dev &
          cd ../..

          # Wait for frontend
          for i in {1..30}; do
            if curl -s http://127.0.0.1:3000 > /dev/null; then
              echo "Frontend ready"
              break
            fi
            sleep 2
          done

      - name: Run all E2E tests
        working-directory: src/frontend
        env:
          BASE_URL: http://127.0.0.1:3000
          CI: true
        run: npx playwright test

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-reports
          path: src/frontend/e2e-results/
          retention-days: 30

  # ========================================
  # Performance Tests
  # ========================================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,backtrader]"
          pip install locust

      - name: Run API performance test
        run: |
          # Basic API response time test
          python -c "
          import time
          import httpx

          # Start the app in a subprocess for testing
          import subprocess
          import asyncio

          from app.main import app
          from uvicorn import Config, Server

          async def run_test():
              config = Config(app=app, host='127.0.0.1', port=8001, log_level='error')
              server = Server(config)

              import threading
              t = threading.Thread(target=server.run)
              t.daemon = True
              t.start()
              await asyncio.sleep(2)

              # Test endpoints
              client = httpx.AsyncClient(base_url='http://127.0.0.1:8001', timeout=10.0)

              start = time.time()
              response = await client.get('/health')
              health_time = (time.time() - start) * 1000

              start = time.time()
              response = await client.get('/')
              root_time = (time.time() - start) * 1000

              await client.aclose()

              print(f'Health check: {health_time:.2f}ms')
              print(f'Root endpoint: {root_time:.2f}ms')

              if health_time > 500:
                  print('::warning::Health check too slow (>500ms)')
              if root_time > 500:
                  print('::warning::Root endpoint too slow (>500ms)')

          asyncio.run(run_test())
          "

  # ========================================
  # Dependency Audit
  # ========================================
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Backend dependency audit
        working-directory: src/backend
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit --desc --format json --output pip-audit-report.json || true

      - name: Frontend dependency audit
        working-directory: src/frontend
        run: |
          npm ci
          npm audit --json > npm-audit-report.json || true
          npm audit --production || true

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: nightly-audit-reports
          path: |
            src/backend/pip-audit-report.json
            src/frontend/npm-audit-report.json
          retention-days: 30

  # ========================================
  # Test Report Summary
  # ========================================
  nightly-summary:
    name: Nightly Summary
    runs-on: ubuntu-latest
    needs: [backend-full-tests, frontend-full-tests, e2e-full-tests, performance-tests, dependency-audit]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Nightly Test Results :crescent_moon:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Full Tests | ${{ needs.backend-full-tests.result == 'success' && ':white_check_mark:' || ':x:' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Full Tests | ${{ needs.frontend-full-tests.result == 'success' && ':white_check_mark:' || ':x:' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Full Tests | ${{ needs.e2e-full-tests.result == 'success' && ':white_check_mark:' || ':x:' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Tests | ${{ needs.performance-tests.result == 'success' && ':white_check_mark:' || ':x:' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-audit.result == 'success' && ':white_check_mark:' || ':x:' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any critical job failed
        if: |
          needs.backend-full-tests.result == 'failure' ||
          needs.frontend-full-tests.result == 'failure' ||
          needs.e2e-full-tests.result == 'failure'
        run: exit 1
