name: CI - Quality Checks

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ========================================
  # Pre-flight Checks
  # ========================================
  check-generated-artifacts:
    name: Check - No Generated Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for generated artifacts
        run: ./scripts/check-generated-artifacts.sh

  check-doc-links:
    name: Check - Doc Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate doc links
        run: python scripts/check_doc_links.py

  check-deps-sync:
    name: Check - Deps Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate deps sync
        run: python scripts/check_deps_sync.py

  # ========================================
  # Backend Quality Checks
  # ========================================
  backend-lint:
    name: Backend - Lint & Type Check
    runs-on: ubuntu-latest
    needs: check-generated-artifacts
    defaults:
      run:
        working-directory: src/backend
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --break-system-packages
          pip install --no-cache-dir --break-system-packages ruff pytest pytest-asyncio httpx
          pip install --no-cache-dir --break-system-packages -e ".[backtrader]"

      - name: Run Ruff linter
        run: |
          ruff check . --output-format=github

      - name: Check Ruff formatting
        run: |
          ruff format --check .

      - name: Check import sorting
        run: |
          ruff check . --select I

      - name: Smoke check backend entrypoint
        run: |
          python -m py_compile app/main.py
          python -c "from app.main import app; print(app.title)"

  backend-test:
    name: Backend - Unit Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --break-system-packages
          pip install --no-cache-dir --break-system-packages -e ".[dev,backtrader,data,redis]"

      - name: Run tests with coverage
        run: |
          pip install --no-cache-dir --break-system-packages pytest-cov pytest-xdist
          pytest --cov=app --cov-config=.coveragerc --cov-report=xml --cov-report=term --cov-report=html --cov-fail-under=80 -n auto -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: src/backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: src/backend/htmlcov/
          retention-days: 7

  backend-security:
    name: Backend - Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --break-system-packages
          pip install --no-cache-dir --break-system-packages bandit safety
          pip install --no-cache-dir --break-system-packages -e .

      - name: Run Bandit security linter (advisory)
        continue-on-error: true
        run: |
          bandit -r app -f json -o bandit-report.json
          bandit -r app -f screen

      - name: Check for security vulnerabilities (advisory)
        continue-on-error: true
        run: |
          safety check --json --output safety-report.json
          safety check

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-security-reports
          path: |
            src/backend/bandit-report.json
            src/backend/safety-report.json

  # ========================================
  # Frontend Quality Checks
  # ========================================
  frontend-lint:
    name: Frontend - Lint & Type Check
    runs-on: ubuntu-latest
    needs: check-generated-artifacts
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Verify ESLint version
        run: npx eslint --version

      - name: Run ESLint
        run: npx eslint . --ext .vue,.js,.jsx,.cjs,.mjs,.ts,.tsx,.cts,.mts

      - name: TypeScript type check
        run: npx vue-tsc --noEmit --skipLibCheck

  frontend-test:
    name: Frontend - Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test -- --run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: src/frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: src/frontend/coverage/
          retention-days: 7

  frontend-build:
    name: Frontend - Production Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/
          retention-days: 7

  # ========================================
  # Integration Tests
  # ========================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
      SECRET_KEY: test-secret-key-for-ci
      JWT_SECRET_KEY: test-jwt-secret-key-for-ci

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --break-system-packages
          pip install --no-cache-dir --break-system-packages -e ".[dev,postgres,backtrader,data,redis]"

      - name: Run integration tests
        run: |
          pytest tests/ -v -m integration --tb=short

  # ========================================
  # Summary Job
  # ========================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [check-generated-artifacts, check-doc-links, check-deps-sync, backend-lint, backend-test, backend-security, frontend-lint, frontend-test, frontend-build, integration-test]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Blocker Jobs (must pass)" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Check Generated Artifacts | ${{ needs.check-generated-artifacts.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Check Doc Links | ${{ needs.check-doc-links.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Check Deps Sync | ${{ needs.check-deps-sync.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Lint | ${{ needs.backend-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Test | ${{ needs.backend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint | ${{ needs.frontend-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Test | ${{ needs.frontend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Test | ${{ needs.integration-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Advisory Jobs (informational)" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Security | ${{ needs.backend-security.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any blocker job failed
        if: |
          needs.check-generated-artifacts.result == 'failure' ||
          needs.check-doc-links.result == 'failure' ||
          needs.check-deps-sync.result == 'failure' ||
          needs.backend-lint.result == 'failure' ||
          needs.backend-test.result == 'failure' ||
          needs.frontend-lint.result == 'failure' ||
          needs.frontend-test.result == 'failure' ||
          needs.frontend-build.result == 'failure' ||
          needs.integration-test.result == 'failure'
        run: exit 1
