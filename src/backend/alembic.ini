[alembic]
script_location = alembic
prepend_sys_path = .
# Overridden at runtime by env.py using DATABASE_URL from app config.
# This fallback value is only used if env.py fails to load.
sqlalchemy.url = sqlite+aiosqlite:///./backtrader.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
